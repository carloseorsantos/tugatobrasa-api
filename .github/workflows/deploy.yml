name: Deploy to Lightsail

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  deploy:
    # branch protection já exige o check "test" verde antes do merge ser
    # possível, então merged==true já implica CI verde — sem precisar
    # depender de workflow_run (merges via GITHUB_TOKEN, como o automerge,
    # não disparam workflows com trigger "push")
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - run: |
          ssh -o StrictHostKeyChecking=accept-new "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" '
            set -e
            cd tugatobrasa-api
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          '
