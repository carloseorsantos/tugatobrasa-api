name: Draft PR from glossary issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  draft-pr:
    if: contains(github.event.issue.labels.*.name, 'glossário')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue into a CSV row
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/issue_to_csv_row.py

      - name: Open draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.parse.outputs.branch }}"
          git add glossary/glossario.csv
          git commit -m "glossary: draft entry from issue #${{ github.event.issue.number }}"
          git push origin "${{ steps.parse.outputs.branch }}"
          gh pr create --base main --head "${{ steps.parse.outputs.branch }}" \
            --title "${{ steps.parse.outputs.pr_title }}" \
            --body-file pr_body.txt \
            --label "glossário"
