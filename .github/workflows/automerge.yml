name: Auto-merge trusted PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    # allowlist de autor confiável — PR de contribuidor externo nunca cai aqui,
    # continua exigindo review manual normalmente
    if: github.event.pull_request.user.login == 'carloseorsantos'
    runs-on: ubuntu-latest
    steps:
      # merge síncrono (não --auto) para poder deployar na mesma job logo em
      # seguida: merges feitos com GITHUB_TOKEN não disparam workflows via
      # push/pull_request-closed (proteção anti-loop do GitHub), então um
      # deploy.yml separado nunca veria esse merge acontecer
      - name: Wait for checks and merge
        run: |
          gh pr checks "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --watch --fail-fast
          gh pr merge --squash "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_KEY }}

      - name: Deploy to Lightsail
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" '
            set -e
            cd tugatobrasa-api
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          '
