name: Auto-merge trusted PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    # allowlist de autor confiável — PR de contribuidor externo nunca cai aqui,
    # continua exigindo review manual normalmente
    if: github.event.pull_request.user.login == 'carloseorsantos'
    runs-on: ubuntu-latest
    steps:
      - run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
