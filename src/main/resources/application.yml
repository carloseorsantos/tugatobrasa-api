server:
  port: 8080

spring:
  application:
    name: tugatobrasa-api
  datasource:
    url: jdbc:postgresql://localhost:5432/tugatobrasa
    username: tugatobrasa
    password: tugatobrasa
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  glossary:
    csv-path: glossary/glossario.csv
